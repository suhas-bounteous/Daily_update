<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th rowspan="2">Name</th>
                <th colspan="2">Marks</th>
            </tr>
            <tr>
                <th>Maths</th>
                <th>Science</th>
            </tr>
        </thead>
        <tr>
            <td>John</td>
            <td>30</td>
            <td>35</td>
        </tr>
    </table>
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
          <tr>
            
            <th rowspan="2">Student Name</th>
            
            <th colspan="3">Subject Marks</th>
          </tr>
          <tr>
            
            <th>Math</th>
            <th>Science</th>
            <th>English</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>John Doe</td>
            <td>85</td>
            <td>92</td>
            <td>88</td>
          </tr>
          <tr>
            <td>Jane Smith</td>
            <td>90</td>
            <td>88</td>
            <td>95</td>
          </tr>
        </tbody>
      </table>

      <table border="1">
        <thead>
            <tr>
                
                <th rowspan="2">Name</th> 
                <th colspan="2">Marks</th>
            </tr>
            <tr>
                
                <th>Maths</th>
                <th>Science</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John</td>
                <td>30</td>
                <td>35</td>
            </tr>
        </tbody>
    </table>
    
      
</body>
</html>
